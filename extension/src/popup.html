<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>feeeeedback</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>feeeeedback</h1>
      <span id="status" class="status status-off">inactif</span>
    </header>

    <!-- Auth: locked -->
    <section id="authNone" hidden>
      <p class="hint">Entre le mot de passe pour débloquer l'extension.</p>
      <form id="unlockForm">
        <input
          id="passwordInput"
          type="password"
          required
          autocomplete="current-password"
          placeholder="Mot de passe"
          class="input"
          autofocus
        />
        <button id="unlockBtn" type="submit" class="btn btn-primary">Déverrouiller</button>
      </form>
      <div id="unlockErr" class="err" hidden></div>
      <div class="or">ou</div>
      <button id="localStartBtn" class="btn btn-ghost">Utiliser en mode local</button>
    </section>

    <!-- Auth: unlocked -->
    <section id="authLoaded" hidden>
      <div class="field">
        <label>Qui donne le feedback ?</label>
        <select id="contributorSelect" class="select">
          <option value="Nicolas">Nicolas</option>
          <option value="Juliane">Juliane</option>
          <option value="Damien">Damien</option>
          <option value="Tony">Tony</option>
          <option value="__other__">Autre…</option>
        </select>
        <input
          id="contributorCustom"
          type="text"
          placeholder="Prénom"
          class="input"
          style="margin-top: 6px; display: none;"
        />
      </div>

      <div class="field">
        <label>Projet</label>
        <select id="projectSelect" class="select"></select>
      </div>

      <div class="page-url">
        <span>Page :</span>
        <span id="tabUrl">—</span>
      </div>

      <button id="lockBtn" class="btn btn-ghost" style="margin-top: 8px;">Verrouiller</button>
    </section>

    <section id="sessionActions" hidden>
      <button id="toggleBtn" class="btn btn-primary">Démarrer une session</button>
    </section>

    <section class="meta" id="meta" hidden>
      <div><span>Éléments :</span> <span id="count">0</span></div>
      <div><span>Projet :</span> <span id="projectLabel">Local</span></div>
      <div><span>Auteur :</span> <span id="contributorLabel">—</span></div>
    </section>

    <section class="actions" id="extraActions" hidden>
      <button id="copyBtn" class="btn btn-ghost">Copier JSON</button>
      <button id="dashBtn" class="btn btn-ghost" hidden>Ouvrir le dashboard</button>
      <button id="clearBtn" class="btn btn-ghost">Vider la session</button>
    </section>

    <footer class="foot">
      <span class="hint-xs">Alt+Shift+S pour toggler le sélecteur</span>
    </footer>

    <script src="format.js"></script>
    <script src="api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
