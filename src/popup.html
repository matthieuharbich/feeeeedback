<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>feeeeedback</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>feeeeedback</h1>
      <span id="status" class="status status-off">inactif</span>
    </header>

    <button id="toggleBtn" class="btn btn-primary">Démarrer une session</button>

    <p class="hint" id="hint">
      Une fois lancée, la session affiche un widget flottant en haut à droite de la page. Tu peux naviguer librement et activer / désactiver le sélecteur quand tu veux.
    </p>

    <section class="meta" id="meta" hidden>
      <div><span>Éléments :</span> <span id="count">0</span></div>
      <div><span>Démarrée sur :</span> <span id="url">—</span></div>
    </section>

    <section class="actions" id="extraActions" hidden>
      <button id="copyBtn" class="btn">Copier JSON</button>
      <button id="clearBtn" class="btn btn-ghost">Vider la session</button>
    </section>

    <script src="format.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
