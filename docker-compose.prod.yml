# Production compose — Postgres + dashboard behind Caddy reverse proxy on host.
# Deploy with: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:17-alpine
    container_name: feeeeedback-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feeeeedback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-feeeeedback}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feeeeedback}"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: feeeeedback-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-feeeeedback}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-feeeeedback}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://feeeeedback.mtth.world}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://feeeeedback.mtth.world}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-feeeeedback <noreply@feeeeedback.mtth.world>}
      UPLOADS_DIR: /app/uploads
    ports:
      - "127.0.0.1:3210:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
