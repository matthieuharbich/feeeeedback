# Dev compose — Postgres only. Run `npm run dev` in dashboard/ against this.
services:
  postgres:
    image: postgres:17-alpine
    container_name: feeeeedback-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: feeeeedback
      POSTGRES_PASSWORD: feeeeedback
      POSTGRES_DB: feeeeedback
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feeeeedback"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
