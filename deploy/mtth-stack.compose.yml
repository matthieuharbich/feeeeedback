# Compose fragment for the existing mtth-stack VPS.
# Uses the shared mtth-postgres (pgvector/pgvector:pg16) already running there.
# Joins the existing mtth-stack_default network so Caddy can reverse-proxy by container name.
#
# Deploy from the repo root on the VPS:
#   docker compose -f deploy/mtth-stack.compose.yml --env-file .env.prod up -d --build
#   docker compose -f deploy/mtth-stack.compose.yml --env-file .env.prod run --rm dashboard node scripts/migrate.mjs

services:
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: mtth-feeeeedback
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mtth-postgres:5432/feeeeedback
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://feeeeedback.mtth.world}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://feeeeedback.mtth.world}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-feeeeedback <noreply@feeeeedback.mtth.world>}
      UPLOADS_DIR: /app/uploads
    volumes:
      - feeeeedback_uploads:/app/uploads
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  default:
    name: mtth-stack_default
    external: true

volumes:
  feeeeedback_uploads:
    name: mtth-feeeeedback_uploads
